<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <title>Solicitud de Reciclaje - Tienda Verde</title>
</head>
<body>
    <!-- naav -->
    <nav class="navbar navbar-expand-sm navbar-light bg-light">
        <a class="navbar-brand" href="index.html">Tienda Verde</a>
        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="catalogo.html">Productos</a></li>
                <li class="nav-item"><a class="nav-link" href="solicitud_reciclaje.html">Solicitud de Reciclaje</a></li>
            </ul>
        </div>
    </nav>

    <section class="container mt-5">
        <h2 class="text-center">Solicitud de Recolección de Residuos</h2>
        <form>
         <!-- Tipos de Residuo -->
            <div class="form-group">
                <label for="tipoResiduo">Tipo de Residuo:</label>
                <select class="form-control" id="tipoResiduo">
                    <option>Plástico</option>
                    <option>Papel</option>
                    <option>Vidrio</option>
                    <option>Metales</option>
                    <option>Electrónicos</option>
                </select>
            </div>


            <!-- subcategorías -->
            <div class="form-group">
                <label for="subcategoriaResiduo">Subcategoría de Residuo:</label>
                <select class="form-control" id="subcategoriaResiduo"></select>
            </div>


            <!-- adicionales -->

            <div class="form-group">
                <label for="nombre">Nombre del Solicitante:</label>
                <input type="text" class="form-control" id="nombre" required>
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico:</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="form-group">
                <label for="direccion">Dirección de Recolección:</label>
                <input type="text" class="form-control" id="direccion" required>
            </div>
            <div class="form-group ">
                <label for="cantidad">Cantidad de Residuos:</label>
                <input type="number" class="form-control" id="cantidad" required>
            </div>
            <div class="form-group">
                <label for="comentarios">Comentarios Adicionales:</label>
                <textarea class="form-control" id="comentarios"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar Solicitud</button>
        </form>
    </section>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
